apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: media-pipeline
spec:
  replicas: 2 # stateless JWT API — scale freely behind the Service
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/media-pipeline:latest # pushed by CI
          command: ["./node_modules/.bin/tsx", "src/api/index.ts"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          readinessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { memory: 384Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: media-pipeline
spec:
  selector: { app: api }
  ports:
    - port: 80
      targetPort: 8080
  # Expose via your ingress controller / LB of choice, e.g.:
  # type: LoadBalancer
